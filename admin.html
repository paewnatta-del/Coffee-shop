<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Brew & Brown</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body style="background-color: #f3f4f6;">
    <header class="admin-header">
        <h1>Brew & Brown - Admin Dashboard</h1>
        <a href="index.html" style="color: white; text-decoration: underline;">กลับหน้าแรก</a>
    </header>

    <main class="container">
        <div class="admin-controls">
            <label for="filterDate" style="font-weight: 600;">เลือกวันที่:</label>
            <input type="date" id="filterDate" class="status-select">
            <button id="btnRefresh" class="btn-submit" style="width: auto; padding: 0.5rem 1.5rem; margin-top: 0;">รีเฟรชข้อมูล</button>
        </div>

        <div id="cardContainer" class="card-grid">
            <div class="loading-state">กำลังโหลดข้อมูล... ⏳</div>
        </div>
    </main>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cwdtpdtwklkwxltuhegz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3ZHRwZHR3a2xrd3hsdHVoZWd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTI1NzIsImV4cCI6MjA5NzU2ODU3Mn0.Vd7NnpmoXXkD1OYlGAr3_q5ZOFvDHXhSz859H9Wt7q8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            const filterDate = document.getElementById('filterDate');
            const btnRefresh = document.getElementById('btnRefresh');
            const cardContainer = document.getElementById('cardContainer');

            // Set default date to empty to load ALL data by default
            filterDate.value = '';

            async function loadReservations() {
                const date = filterDate.value;
                cardContainer.innerHTML = '<div class="loading-state">กำลังโหลดข้อมูล... ⏳</div>';

                let query = supabaseClient.from('reservation').select('*');
                
                // If a date is selected, filter by it. Otherwise, load all.
                if (date) {
                    query = query.eq('booking_date', date);
                }
                
                // Order by date first, then time
                query = query.order('booking_date', { ascending: false }).order('time_slot', { ascending: true });

                const { data, error } = await query;

                if (error) {
                    console.error('Error fetching reservations:', error);
                    cardContainer.innerHTML = '<div class="error-state">ไม่สามารถดึงข้อมูลได้ในขณะนี้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือรีเฟรชใหม่อีกครั้ง</div>';
                    return;
                }

                if (!data || data.length === 0) {
                    cardContainer.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูล</div>';
                    return;
                }

                cardContainer.innerHTML = '';
                data.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'admin-card';
                    
                    // Create status dropdown
                    const statusSelect = `
                        <select class="status-select status-${row.status}" onchange="updateStatus('${row.id}', this.value)" style="background-color: var(--status-${row.status}-bg, #fff);">
                            <option value="Booked" ${row.status === 'Booked' ? 'selected' : ''}>Booked (จอง)</option>
                            <option value="Arrived" ${row.status === 'Arrived' ? 'selected' : ''}>Arrived (มาถึงแล้ว)</option>
                            <option value="Cancelled" ${row.status === 'Cancelled' ? 'selected' : ''}>Cancelled (ยกเลิก)</option>
                        </select>
                    `;

                    // Format date to be more readable
                    const dateObj = new Date(row.booking_date);
                    const formattedDate = dateObj.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="datetime">
                                <span class="date">${formattedDate}</span>
                                <span class="time">${row.time_slot}</span>
                            </div>
                            <div class="ref">${row.booking_ref}</div>
                        </div>
                        <div class="card-body">
                            <div class="info-row"><span class="label">ชื่อลูกค้า:</span> <span class="value">${row.customer_name}</span></div>
                            <div class="info-row"><span class="label">เบอร์โทร:</span> <span class="value">${row.phone_number}</span></div>
                            <div class="info-row"><span class="label">จำนวนคน:</span> <span class="value">${row.guests_count} ท่าน</span></div>
                            <div class="info-row"><span class="label">หมายเหตุ:</span> <span class="value">${row.special_requests || '-'}</span></div>
                        </div>
                        <div class="card-footer">
                            ${statusSelect}
                        </div>
                    `;
                    cardContainer.appendChild(card);
                });
            }

            // Function to update status
            window.updateStatus = async (id, newStatus) => {
                const { error } = await supabaseClient
                    .from('reservation')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (error) {
                    alert('เกิดข้อผิดพลาดในการอัปเดตสถานะ: ' + error.message);
                } else {
                    loadReservations(); // Reload to refresh
                }
            };

            filterDate.addEventListener('change', loadReservations);
            btnRefresh.addEventListener('click', loadReservations);

            loadReservations();
        });
    </script>
</body>
</html>
